#
# Documentation: https://zessentials.groupez.dev/modules/teleportation
#
########################################################################################################################

enable: true

# If the teleport destination is unsafe, should players be teleported to the nearest safe location?
# If this is set to true, zEssentials will attempt to teleport players close to the intended destination. The destination will be on the same x and z, only the y will change.
# If this is set to false, attempted teleports to unsafe locations will be cancelled with a warning.
teleport-safety: true

# Whether to make all teleportations go to the center of the block; where the x and z coordinates decimal become .5
teleport-to-center: true

# The delay, in seconds, before a user actually teleports. If the user moves or gets attacked in this timeframe, the teleport is cancelled.
teleport-delay: 5

# The delay, in seconds, before a user actually teleports. If the user has one or more permissions, the minimum delay will be taken.
teleport-delay-permissions:
  - permission: "essentials.teleport.delay.vip"
    delay: 4
  - permission: "essentials.teleport.delay.staff"
    delay: 2

# Enable bypass of teleport delay on player to essentials.teleport.bypass permission
teleport-delay-bypass: false

# Sound played every second during the teleport countdown
countdown-sound:
  enabled: false
  sound: BLOCK_NOTE_BLOCK_HAT
  volume: 1.0
  pitch: 1.0

# Sound played when the teleportation is completed
complete-sound:
  enabled: false
  sound: ENTITY_ENDERMAN_TELEPORT
  volume: 1.0
  pitch: 1.0

# The delay, in seconds, for the teleport request to expire.
teleport-tpa-expire: 60

# Opens a confirmation inventory for the /tpa command.
open-confirm-inventory-for-tpa: false

# Opens a confirmation inventory for the /tpahere command.
open-confirm-inventory-for-tpa-here: false

rtp-worlds:
  - world: "world"
    center-x: 0
    center-z: 0
    radius-x: 5000
    radius-z: 5000
  - world: "survivalspawn"
    center-x: 0
    center-z: 0
    radius-x: 5000
    radius-z: 5000

max-rtp-attempts: 10

blacklist-biomes:
  - cold_ocean
  - deep_cold_ocean
  - deep_frozen_ocean
  - deep_lukewarm_ocean
  - deep_ocean
  - deep_warm_ocean
  - frozen_ocean
  - frozen_river
  - lukewarm_ocean
  - ocean
  - river
  - warm_ocean

teleport-protection: 1000

teleport-protections:
  - permission: "essentials.teleport.protection.vip"
    delay: 2000
  - permission: "essentials.teleport.protection.staff"
    delay: 3000

# Allows you to obtain information on the search for random teleportation
enable-random-teleport-search-log-message: true

# Enable queue system for random teleport
# When enabled, players will be added to a queue and teleported one by one
enable-rtp-queue: false

# Delay in milliseconds between each teleport in queue (2000 = 2 seconds)
rtp-queue-delay: 2000

# Enable automatic RTP on first join
enable-first-join-rtp: false

# World to teleport first join players to
# Leave empty to use player's spawn world
first-join-rtp-world: "world"

# World override mappings
# When a player uses /rtp in fromWorld, they will be teleported to toWorld instead
# Format: fromWorld: toWorld
rtp-world-overrides:
  - from: "world_nether"
    to: "world"
  - from: "world_the_end"
    to: "world"